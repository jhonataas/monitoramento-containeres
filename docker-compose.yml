services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1 # Versão mais atualizada
    container_name: cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command:
      - '--docker_only=true' # Força o foco apenas em containers docker
      - '--housekeeping_interval=10s'