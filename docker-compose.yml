version: '3.8'

services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    # Mapeamento da porta: [Porta no seu PC]:[Porta dentro do Container]
    ports:
      - "8081:8081"
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    command:
      - '--docker_only=true'
      - '--housekeeping_interval=10s'
      - '--port=8081'
    restart: unless-stopped